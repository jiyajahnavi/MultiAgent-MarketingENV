# OpenEnv Environment Manifest
spec_version: 1
name: ai-research-scientist
type: environment
runtime: docker

app: server.app:app
port: 7860

# Metadata
description: >
AI Research Scientist Environment — an OpenEnv-compliant simulation
of scientific research workflows. Agents iteratively read papers,
formulate hypotheses, design experiments, execute them, analyze results,
and refine their reasoning.

The environment emphasizes multi-step reasoning, experimental decision-making,
and iterative improvement under constraints. It includes 3 difficulty levels
(easy, medium, hard) with deterministic grading and dense reward shaping.

author: Aditya Kumar Singh
version: 1.0.0

# Task configuration
tasks:
  - id: task_easy_image_classification
    difficulty: easy
    description: Image classification research with clear performance signals
    max_steps: 12

  - id: task_medium_nlp_sentiment
    difficulty: medium
    description: NLP sentiment analysis with noisy experimental results
    max_steps: 12

  - id: task_hard_tabular_prediction
    difficulty: hard
    description: Tabular prediction with conflicting evidence and experiment budget constraints
    max_steps: 15

# Action & Observation Space

action_space:
type: discrete
actions:
- read_paper
- propose_hypothesis
- design_experiment
- run_experiment
- analyze_results
- refine_hypothesis
- final_answer

observation_space:
type: structured
fields:
- problem_statement
- available_papers
- available_datasets
- available_methods
- current_hypothesis
- experiments_run
- results_history
- best_accuracy
- step_count

# API endpoints
endpoints:
  reset: /reset
  step: /step
  state: /state
  health: /health

# Grading
grading:
  type: deterministic
  score_range: [0.0, 1.0]
  multi_factor: true

description: >
Final scores are computed using a multi-factor grading system
that evaluates hypothesis quality, experiment efficiency,
accuracy improvement, reasoning consistency, and final answer quality.
  
  components:
    - hypothesis_quality
    - experiment_efficiency
    - accuracy_improvement
    - reasoning_consistency
    - final_answer_quality

# Reward System

reward:
type: dense
description: >
Step-wise rewards provide incremental feedback based on:
- improvement in experimental results
- quality of actions (hypothesis, analysis, refinement)
- efficiency and progression
Penalties are applied for invalid, redundant, or inefficient actions.

# Execution Constraints

constraints:
max_runtime_minutes: 20
cpu: 2
memory_gb: 8

# Determinism

determinism:
enabled: true
description: >
All experiment outcomes are deterministic given a fixed seed.
Controlled noise is applied for medium and hard tasks using
seeded random generators to ensure reproducibility.

# Inference

inference:
entrypoint: inference.py
description: >
Runs baseline agent across all tasks and outputs reproducible scores.